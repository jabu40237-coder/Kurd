<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokxse | المنصة العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="app-loader" class="loader-screen">
        <div class="loader-logo"><i class="fas fa-bolt"></i> Lokxse</div>
        <div class="loader-spinner"></div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="app-container" class="hidden">
        <header class="glass-nav">
            <nav>
                <a class="logo" data-route="home"><i class="fas fa-bolt"></i> Lokxse</a>
                <ul class="nav-links">
                    <li><a data-route="home">الرئيسية</a></li>
                    <li><a data-route="store">المتجر الرقمي</a></li>
                    <li><a data-route="faq">الأسئلة الشائعة</a></li>
                    <li><a data-route="contact">تواصل معنا</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="btn-nav" id="loginBtn">دخول</button>
                    <div class="user-account" id="userAccountBtn"><i class="fas fa-user-circle"></i> <span id="userNameDisplay">حسابي</span></div>
                </div>
            </nav>
        </header>
        
        <main id="main-content"></main>
        
        <footer style="margin-top:4rem; background:#0a0a0f; border-top:1px solid var(--border-glass); padding:2rem; text-align:center;">
            <a data-route="privacy" style="color:var(--text-secondary); margin:0 1rem;">سياسة الخصوصية</a>
            <a data-route="terms" style="color:var(--text-secondary); margin:0 1rem;">الشروط والأحكام</a>
            <p style="color:var(--text-secondary); margin-top:1rem;">&copy; 2024 Lokxse Technologies</p>
        </footer>
    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><div><h4 id="toastTitle">تم</h4><p id="toastMsg"></p></div></div>

    <!-- تشغيل الجافاسكريبت كوحدات (ES6 Modules) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
